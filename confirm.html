<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaMatch - Confirmation email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #D4AF37; font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .check { font-size: 48px; margin-bottom: 16px; }
    p { color: #ccc; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #D4AF37;
      color: #000;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }
    .hint { color: #555; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>CaMatch</h1>
    <p class="subtitle">Trouvez vos partenaires de padel</p>
    <p>Votre email a bien été confirmé !<br>Vous pouvez maintenant vous connecter à l'application.</p>
    <a href="camatch://" class="btn">Ouvrir CaMatch</a>
    <p class="hint">Si l'application ne s'ouvre pas automatiquement,<br>appuyez sur le bouton ci-dessus.</p>
  </div>
  <script>
    setTimeout(() => { window.location.href = 'camatch://'; }, 1500);
  </script>
</body>
</html>
