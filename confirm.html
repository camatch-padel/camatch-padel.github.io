<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaMatch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #D4AF37; font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .check { font-size: 48px; margin-bottom: 16px; }
    p { color: #ccc; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #D4AF37;
      color: #000;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }
    .hint { color: #555; font-size: 12px; margin-top: 16px; }
    .error { color: #e74c3c; font-size: 14px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check" id="icon">✅</div>
    <h1>CaMatch</h1>
    <p class="subtitle">Trouvez vos partenaires de padel</p>
    <p id="message">Redirection en cours...</p>
    <a href="camatch://" class="btn" id="btn">Ouvrir CaMatch</a>
    <p class="hint" id="hint">Si l'application ne s'ouvre pas automatiquement,<br>appuyez sur le bouton ci-dessus.</p>
  </div>
  <script>
    // Supabase peut mettre les params dans le hash (#) ou dans le query string (?)
    const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
    const queryParams = new URLSearchParams(window.location.search);

    const error = hashParams.get('error') || queryParams.get('error');
    const type = hashParams.get('type') || queryParams.get('type');
    const tokenHash = queryParams.get('token_hash');
    const accessToken = hashParams.get('access_token');

    if (error) {
      // Lien invalide ou expiré
      document.getElementById('icon').textContent = '⚠️';
      document.getElementById('message').innerHTML = 'Ce lien est invalide ou a expiré.<br>Veuillez faire une nouvelle demande.';
      document.getElementById('btn').href = 'camatch://';
      document.getElementById('btn').textContent = 'Retour à l\'application';
      document.getElementById('hint').style.display = 'none';
    } else if (type === 'recovery') {
      // Réinitialisation mot de passe
      document.getElementById('icon').textContent = '🔑';
      document.getElementById('message').textContent = 'Redirection vers la réinitialisation de votre mot de passe...';
      const resetUrl = tokenHash
        ? 'camatch://reset-password?token_hash=' + tokenHash + '&type=recovery'
        : 'camatch://reset-password?access_token=' + accessToken + '&type=recovery';
      document.getElementById('btn').href = resetUrl;
      document.getElementById('btn').textContent = 'Réinitialiser mon mot de passe';
      setTimeout(() => { window.location.href = resetUrl; }, 1500);
    } else {
      // Confirmation email
      document.getElementById('message').innerHTML = 'Votre email a bien été confirmé !<br>Vous pouvez maintenant vous connecter à l\'application.';
      document.getElementById('btn').href = 'camatch://';
      document.getElementById('btn').textContent = 'Ouvrir CaMatch';
      setTimeout(() => { window.location.href = 'camatch://'; }, 1500);
    }
  </script>
</body>
</html>
